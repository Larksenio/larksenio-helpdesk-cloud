<div class="login-page">
  <div class="login-card">
    <div class="brand">
      <span class="brand-icon">☁️</span>
      <div>
        <h1>Larksenio HelpDesk Cloud</h1>
        <p>Panel administrador de tickets</p>
      </div>
    </div>

    <form (ngSubmit)="login()" class="login-form">
      <label>Email</label>
      <input
        type="email"
        name="email"
        [(ngModel)]="email"
        placeholder="admin@larksenio.com"
        required
      />

      <label>Contraseña</label>
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        placeholder="********"
        required
      />

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar al panel' }}
      </button>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>
  </div>
</div>
